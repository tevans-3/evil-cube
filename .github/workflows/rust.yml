name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest
    permissions: 
      contents: read 
      pull-requests: write 
      issues: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        components: rustfmt
    - name: Add wasm32 target 
      run: rustup target add wasm32-unknown-unknown
    - name: Build
      working-directory: ./backend/spacetimedb
      run: cargo build --target wasm32-unknown-unknown
    - name: Run tests
      working-directory: ./backend/spacetimedb
      run: cargo test --verbose
